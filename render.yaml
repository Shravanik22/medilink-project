services:
  - type: web
    name: medilink
    env: python
    region: singapore   # closest free-tier region to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DB_HOST
        value: "gateway01.ap-southeast-1.prod.aws.tidbcloud.com"
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        value: "jrecBMtLWS1Phvm.root"
      - key: DB_PASSWORD
        value: "kq4g1Ev0dXCZbSBy"
      - key: DB_NAME
        value: "test"
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
