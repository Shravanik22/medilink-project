<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MediLink{% endblock %} – Smart Telemedicine</title>
  <meta name="description" content="{% block meta_desc %}MediLink connects patients with chemists for seamless prescription management and medicine ordering.{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div data-flash="{{ cat }}" style="display:none">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{% block body %}{% endblock %}

<div class="toast-container"></div>
<div class="page-loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Loading…</div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
