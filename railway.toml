[build]
# builder = RAILPACK (default for Python projects)
# No build-time secrets needed — all env vars (DB_HOST, DB_PORT, etc.)
# are runtime-only and will be available when gunicorn starts.
# This prevents "secret X: not found" errors during the build phase.
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info --access-logfile - --error-logfile -"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
